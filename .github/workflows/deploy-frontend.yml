name: Deploy Frontend → S3 + CloudFront

on:
  workflow_dispatch:  # Manual trigger only until AWS infra is ready
  # push:
  #   branches: [main]
  #   paths:
  #     - "frontend/**"
  #     - ".github/workflows/deploy-frontend.yml"

permissions:
  id-token: write             # needed for OIDC → AWS auth (no long-lived keys)
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}  # e.g. https://api.yourdomain.com

      # ── AWS Auth via OIDC (no stored AWS keys) ─────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Deploy to S3 ───────────────────────────────────────────────────────
      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html: no-cache so users always get latest
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      # ── Invalidate CloudFront cache ────────────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Done
        run: echo "Frontend live at https://${{ secrets.CLOUDFRONT_DOMAIN }}"
