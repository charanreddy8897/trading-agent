[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage settings
addopts =
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=85
    -v
    --tb=short
    --strict-markers

markers =
    unit: Unit tests (fast, no DB)
    integration: Integration tests (requires DB)
    slow: Slow-running tests
    auth: Authentication tests
    api: API endpoint tests

# Ignore warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:yfinance.*
    ignore::DeprecationWarning:robin_stocks.*
